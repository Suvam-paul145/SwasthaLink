name: CI Reusable

on:
  workflow_call:
    inputs:
      run-e2e:
        required: false
        type: boolean
        default: false
      push-artifacts:
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node
        with:
          node-version: "20"
          working-directory: .

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

      - name: Upload frontend build artifact
        if: ${{ inputs.push-artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist

  backend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: ./.github/actions/setup-python
        with:
          python-version: "3.11"
          working-directory: backend
          install-dev: "true"

      - name: Lint
        run: python -m ruff check .

      - name: Compile check
        run: python -m compileall .

      - name: Tests
        run: pytest

      - name: Package backend artifact
        run: tar -czf backend-artifact.tar.gz .

      - name: Upload backend artifact
        if: ${{ inputs.push-artifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: backend-artifact
          path: backend/backend-artifact.tar.gz

  e2e-tests:
    if: ${{ inputs.run-e2e }}
    runs-on: ubuntu-latest
    needs: [frontend-quality, backend-quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: ./.github/actions/setup-node
        with:
          node-version: "20"
          working-directory: .

      - name: Run E2E tests
        run: npm run test:e2e

  docker-build:
    runs-on: ubuntu-latest
    needs: [frontend-quality, backend-quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t swasthalink-frontend:ci .

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t swasthalink-backend:ci ./backend
