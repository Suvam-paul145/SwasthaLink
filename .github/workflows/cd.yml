name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        type: choice
        default: staging
        options:
          - staging
          - production
      strategy:
        description: Deployment strategy
        required: true
        type: choice
        default: rolling
        options:
          - rolling
          - blue-green

jobs:
  deploy:
    if: >
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
      }}
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Resolve deployment config
        id: cfg
        shell: bash
        run: |
          ENVIRONMENT="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'production' }}"
          STRATEGY="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.strategy || 'rolling' }}"
          echo "environment=$ENVIRONMENT" >> "$GITHUB_OUTPUT"
          echo "strategy=$STRATEGY" >> "$GITHUB_OUTPUT"

      - name: Deploy via Kustomize overlay
        shell: bash
        run: |
          kubectl apply -k "infra/k8s/overlays/${{ steps.cfg.outputs.environment }}"
          if [ "${{ steps.cfg.outputs.strategy }}" = "blue-green" ]; then
            kubectl rollout status deployment/swasthalink-backend -n swasthalink --timeout=180s
            kubectl rollout status deployment/swasthalink-frontend -n swasthalink --timeout=180s
          fi

      - name: Verify rollout
        shell: bash
        run: |
          kubectl rollout status deployment/swasthalink-backend -n swasthalink --timeout=180s
          kubectl rollout status deployment/swasthalink-frontend -n swasthalink --timeout=180s

      - name: Rollback on production failure
        if: ${{ failure() && steps.cfg.outputs.environment == 'production' }}
        shell: bash
        run: |
          kubectl rollout undo deployment/swasthalink-backend -n swasthalink || true
          kubectl rollout undo deployment/swasthalink-frontend -n swasthalink || true
