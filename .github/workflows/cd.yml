# =============================================================================
# CD — Continuous Deployment
# =============================================================================
# Triggers:
#   1. Auto: after CI succeeds on `testing` branch
#   2. Manual: workflow_dispatch with environment choice
#
# Deployment targets:
#   - Frontend: Vercel (auto-deploys on push, this workflow runs smoke test)
#   - Backend:  Render (triggered via Deploy Hook)
#
# Required secrets (set in repo Settings → Secrets):
#   RENDER_DEPLOY_HOOK_URL  — Render deploy hook URL for the backend service
#   VERCEL_FRONTEND_URL     — Deployed Vercel URL (for smoke test)
#   RENDER_BACKEND_URL      — Deployed Render URL (for smoke test)
# =============================================================================

name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [testing]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        type: choice
        default: production
        options:
          - staging
          - production
      skip_smoke_test:
        description: "Skip post-deploy smoke test"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Gate: Only deploy if CI passed
  # ---------------------------------------------------------------------------
  gate:
    name: "Deployment Gate"
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: CI passed — deployment approved
        run: echo "CI workflow succeeded. Proceeding with deployment."

  # ---------------------------------------------------------------------------
  # Deploy Backend to Render
  # ---------------------------------------------------------------------------
  deploy-backend:
    name: "Deploy Backend (Render)"
    runs-on: ubuntu-latest
    needs: gate
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: ${{ secrets.RENDER_BACKEND_URL }}
    steps:
      - name: Trigger Render deploy
        shell: bash
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_URL not set. Render auto-deploys on push."
            echo "Set the deploy hook in Render Dashboard → Settings → Deploy Hook."
            exit 0
          fi
          echo "Triggering Render deploy..."
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" || echo "000")
          echo "Render responded with HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Deploy triggered successfully."
          else
            echo "::warning::Render deploy hook returned HTTP $HTTP_CODE"
          fi

  # ---------------------------------------------------------------------------
  # Post-Deploy Smoke Test
  # ---------------------------------------------------------------------------
  smoke-test:
    name: "Smoke Test"
    runs-on: ubuntu-latest
    needs: deploy-backend
    if: ${{ !(github.event.inputs.skip_smoke_test == 'true') }}
    steps:
      - name: Wait for Render to deploy
        shell: bash
        run: |
          echo "Waiting 90s for Render to pick up the new deploy..."
          sleep 90

      - name: Check backend health
        shell: bash
        run: |
          BACKEND_URL="${{ secrets.RENDER_BACKEND_URL }}"
          if [ -z "$BACKEND_URL" ]; then
            echo "::warning::RENDER_BACKEND_URL not set — skipping backend smoke test."
            exit 0
          fi
          echo "Checking $BACKEND_URL/api/health..."
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "$BACKEND_URL/api/health" || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Backend is healthy (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i: HTTP $HTTP_CODE — retrying in 30s..."
            sleep 30
          done
          echo "::error::Backend health check failed after 5 attempts."
          exit 1

      - name: Check frontend
        shell: bash
        run: |
          FRONTEND_URL="${{ secrets.VERCEL_FRONTEND_URL }}"
          if [ -z "$FRONTEND_URL" ]; then
            echo "::warning::VERCEL_FRONTEND_URL not set — skipping frontend smoke test."
            exit 0
          fi
          echo "Checking $FRONTEND_URL..."
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "$FRONTEND_URL" || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Frontend is reachable (HTTP 200)"
          else
            echo "::warning::Frontend returned HTTP $HTTP_CODE"
          fi
