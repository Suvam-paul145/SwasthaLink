# =============================================================================
# CI ‚Äî Continuous Integration
# =============================================================================
# Runs on every push to `testing` and every PR targeting `testing`.
# Calls the reusable workflow for all quality gates.
# =============================================================================

name: CI

on:
  push:
    branches: [testing]
  pull_request:
    branches: [testing]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci-reusable.yml
    secrets: inherit
